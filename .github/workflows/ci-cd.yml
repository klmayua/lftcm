name: CI/CD Pipeline with VPS Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Quality Gates
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Web
        run: cd apps/web && npm run lint

      - name: Lint API
        run: cd apps/api && npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd packages/database && npx prisma generate

      - name: Run Unit Tests
        run: cd apps/web && npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/web/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  # ============================================
  # Build & Package
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd packages/database && npx prisma generate

      - name: Build Web
        run: cd apps/web && npm run build

      - name: Build API
        run: cd apps/api && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            apps/web/.next/
            apps/api/dist/
            packages/database/dist/
          retention-days: 1

  # ============================================
  # Docker Build with Caching
  # ============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: false
          tags: lftcm-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/web-image.tar

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          tags: lftcm-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/api-image.tar

      - name: Upload Docker images
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/web-image.tar
            /tmp/api-image.tar
          retention-days: 1

  # ============================================
  # Deploy to Staging VPS
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Staging
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} '
            set -e
            cd /opt/lftcm

            # Backup database before deploy
            docker-compose exec -T postgres pg_dump -U lftcm lftcm_prod | gzip > backups/pre_deploy_$(date +%Y%m%d_%H%M%S).sql.gz || true

            # Pull latest code
            git fetch origin
            git reset --hard origin/develop

            # Build and deploy
            docker-compose -f docker-compose.prod.yml pull || true
            docker-compose -f docker-compose.prod.yml build --no-cache
            docker-compose -f docker-compose.prod.yml up -d

            # Run migrations
            sleep 10
            docker-compose -f docker-compose.prod.yml exec -T api npx prisma migrate deploy

            # Cleanup
            docker system prune -f

            # Health check
            sleep 5
            curl -f http://localhost:4000/health || exit 1
            curl -f http://localhost:3000 || exit 1
          '

      - name: Notify on failure
        if: failure()
        run: |
          echo "Staging deployment failed!" | mail -s "LFTCM Staging Deploy Failed" ${{ secrets.ALERT_EMAIL }}

  # ============================================
  # Deploy to Production VPS
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Production
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} '
            set -e
            cd /opt/lftcm

            # Create deployment timestamp
            DEPLOY_TIME=$(date +%Y%m%d_%H%M%S)
            echo "Starting deployment at $DEPLOY_TIME"

            # Backup database
            docker-compose -f docker-compose.prod.yml exec -T postgres pg_dump -U lftcm lftcm_prod | gzip > backups/pre_deploy_$DEPLOY_TIME.sql.gz

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Build with zero downtime
            docker-compose -f docker-compose.prod.yml build --no-cache

            # Start new containers
            docker-compose -f docker-compose.prod.yml up -d

            # Run migrations
            sleep 10
            docker-compose -f docker-compose.prod.yml exec -T api npx prisma migrate deploy

            # Verify health
            sleep 10
            curl -f http://localhost:4000/health || exit 1
            curl -f http://localhost:3000 || exit 1

            # Cleanup old images
            docker system prune -af --volumes

            echo "Deployment completed successfully!"
          '

      - name: Notify on success
        if: success()
        run: |
          echo "Production deployment successful! Version: ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Production deployment failed!" | mail -s "URGENT: LFTCM Production Deploy Failed" ${{ secrets.ALERT_EMAIL }}

      - name: Rollback on failure
        if: failure()
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} '
            cd /opt/lftcm
            docker-compose -f docker-compose.prod.yml down
            git reset --hard HEAD~1
            docker-compose -f docker-compose.prod.yml up -d
          '
